<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="260" viewBox="0 0 1100 260">
  <defs>
    <style>
      .title { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .label { font: 600 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .small { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .box { rx: 14; ry: 14; stroke-width: 2; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1100" height="260" fill="#fcfcfd"/>
  <text x="40" y="36" class="title">当前仓库最基础的输入输出</text>

  <rect x="60" y="80" width="180" height="70" class="box" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="150" y="108" text-anchor="middle" class="label">文件输入</text>
  <text x="150" y="129" text-anchor="middle" class="small">上传文件 / 本地文件</text>

  <rect x="300" y="80" width="220" height="70" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="410" y="108" text-anchor="middle" class="label">索引处理</text>
  <text x="410" y="129" text-anchor="middle" class="small">提取文本、切块、写入向量库</text>

  <rect x="580" y="80" width="170" height="70" class="box" fill="#fef3c7" stroke="#d97706"/>
  <text x="665" y="108" text-anchor="middle" class="label">向量库</text>
  <text x="665" y="129" text-anchor="middle" class="small">Embeddings + Metadata</text>

  <rect x="60" y="180" width="180" height="70" class="box" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="150" y="208" text-anchor="middle" class="label">查询输入</text>
  <text x="150" y="229" text-anchor="middle" class="small">问题 / 查询字符串</text>

  <rect x="300" y="180" width="220" height="70" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="410" y="208" text-anchor="middle" class="label">检索处理</text>
  <text x="410" y="229" text-anchor="middle" class="small">向量化查询并搜索相关 Chunk</text>

  <rect x="800" y="130" width="230" height="70" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="915" y="158" text-anchor="middle" class="label">返回相关文本块</text>
  <text x="915" y="179" text-anchor="middle" class="small">不是最终自然语言答案</text>

  <line x1="240" y1="115" x2="300" y2="115" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="520" y1="115" x2="580" y2="115" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="240" y1="215" x2="300" y2="215" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="750" y1="115" x2="800" y2="150" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="520" y1="215" x2="800" y2="180" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
</svg>
