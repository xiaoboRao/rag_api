<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520">
  <defs>
    <style>
      .title { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .label { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .item { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="980" height="520" fill="#fcfcfd"/>
  <text x="40" y="40" class="title">完整问答系统的三层结构</text>

  <rect x="80" y="80" width="820" height="110" rx="18" ry="18" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="490" y="114" text-anchor="middle" class="label">数据层</text>
  <text x="170" y="155" class="item">• 文档解析</text>
  <text x="350" y="155" class="item">• 切块</text>
  <text x="500" y="155" class="item">• Embedding</text>
  <text x="690" y="155" class="item">• Vector Store</text>

  <rect x="80" y="220" width="820" height="110" rx="18" ry="18" fill="#e3f2fd" stroke="#1565c0" stroke-width="2.5"/>
  <text x="490" y="254" text-anchor="middle" class="label">检索层</text>
  <text x="140" y="295" class="item">• Query Embedding</text>
  <text x="360" y="295" class="item">• Similarity Search</text>
  <text x="600" y="295" class="item">• 按 file_id 过滤</text>
  <text x="760" y="295" class="item">• 返回上下文片段</text>

  <rect x="80" y="360" width="820" height="110" rx="18" ry="18" fill="#fff3e0" stroke="#ef6c00" stroke-width="2.5"/>
  <text x="490" y="394" text-anchor="middle" class="label">生成层</text>
  <text x="170" y="435" class="item">• Prompt 组装</text>
  <text x="410" y="435" class="item">• LLM 生成答案</text>
  <text x="670" y="435" class="item">• 引用与输出</text>

  <line x1="490" y1="190" x2="490" y2="220" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="330" x2="490" y2="360" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow)"/>
</svg>
